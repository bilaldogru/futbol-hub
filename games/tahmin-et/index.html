<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futbolcu Arena - Günlük Meydan Okuma</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../style.css"> 
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="text-white h-[100dvh] overflow-hidden flex flex-col items-center font-['Montserrat'] pitch-gradient-texture-green">

    <a href="../../index.html" class="fixed top-4 left-4 z-[140] flex items-center gap-2 text-white font-bold text-sm px-4 py-2 bg-black/40 backdrop-blur-md border border-white/10 rounded-full hover:bg-[#39ff14]/20 hover:border-[#39ff14] hover:text-[#39ff14] transition-all shadow-[0_0_15px_rgba(57,255,20,0.3)]">
        <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">ANA MENÜ</span>
    </a>

    <div id="difficulty-modal" onclick="if(event.target === this) window.location.href='../../index.html';" class="fixed inset-0 z-[120] flex items-center justify-center bg-black/95 backdrop-blur-lg px-4 transition-opacity duration-300">
        <div class="bg-gray-900 border-2 border-[#39ff14] p-8 rounded-3xl max-w-md w-full text-center shadow-[0_0_30px_rgba(57,255,20,0.3)] modal-animate">
            <h2 class="text-4xl font-black mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-yellow-300">ZORLUK SEÇİMİ</h2>
            <p class="text-gray-400 mb-8 text-sm font-bold tracking-wide">Her seviyeyi günde sadece 1 kez oynayabilirsin!</p>
            
            <div class="flex flex-col gap-3">
                <button id="btn-kolay" onclick="startGame('kolay')" class="w-full bg-gray-800 text-white border border-gray-600 font-bold py-4 rounded-xl transition-all hover:bg-gray-700 hover:border-[#39ff14]">
                    <i class="fa-solid fa-star text-green-400 mr-2"></i> <span class="text-lg">KOLAY</span>
                    <span class="block text-[10px] text-gray-400 mt-1 uppercase tracking-widest">1 Soru = 100 Puan</span>
                </button>
                <button id="btn-orta" onclick="startGame('orta')" class="w-full bg-gray-800 text-white border border-gray-600 font-bold py-4 rounded-xl transition-all hover:bg-gray-700 hover:border-yellow-400">
                    <i class="fa-solid fa-star-half-stroke text-yellow-400 mr-2"></i> <span class="text-lg">ORTA</span>
                    <span class="block text-[10px] text-gray-400 mt-1 uppercase tracking-widest">1 Soru = 150 Puan</span>
                </button>
                <button id="btn-zor" onclick="startGame('zor')" class="w-full bg-gray-800 text-white border border-gray-600 font-bold py-4 rounded-xl transition-all hover:bg-gray-700 hover:border-red-500">
                    <i class="fa-solid fa-fire text-red-500 mr-2"></i> <span class="text-lg">ZOR</span>
                    <span class="block text-[10px] text-gray-400 mt-1 uppercase tracking-widest">1 Soru = 250 Puan</span>
                </button>
            </div>
        </div>
    </div>

    <div id="game-wrapper" class="w-full max-w-2xl flex flex-col h-full relative z-10 overflow-hidden">
        
        <div class="w-full px-4 pt-6 shrink-0 z-50">
            <div class="w-full bg-gray-900 border-2 border-[#39ff14] shadow-[0_0_20px_rgba(57,255,20,0.2)] rounded-3xl backdrop-blur-md overflow-hidden flex flex-col">
                <header class="w-full relative flex justify-between items-center p-4 border-b border-gray-800 min-h-[65px]">
                    <div class="text-xs font-bold text-[#39ff14] px-3 py-1 bg-green-950/30 rounded-full border border-green-800 relative z-10">
                        SORU: <span id="q-count" class="text-white">1</span>/10
                    </div>
                    <h1 class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-2xl sm:text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-yellow-300 drop-shadow-md m-0 z-0 text-center">
                        GİZLİ EFSANE
                    </h1>
                    <button class="text-2xl text-gray-400 hover:text-white transition relative z-10">
                        <i class="fa-solid fa-fire text-orange-500"></i>
                    </button>
                </header>
                <div class="w-full flex justify-between px-6 py-3 bg-black/30 text-sm font-bold">
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] text-gray-500 tracking-widest mb-1">BU SORU</span>
                        <span id="current-score" class="text-[#39ff14] text-xl font-black">100</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] text-gray-500 tracking-widest mb-1">TOPLAM PUAN</span>
                        <span id="total-score" class="text-yellow-400 text-xl font-black">0</span>
                    </div>
                </div>
            </div>
        </div>

        <main class="flex-grow flex flex-col items-center w-full px-4 overflow-y-auto">
            <div class="w-full max-w-lg flex flex-col items-center my-auto py-6 shrink-0">
                <div id="hangman-area" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[60px] w-full shrink-0">
                </div>

                <div class="w-full bg-gray-900 p-5 sm:p-6 rounded-3xl border-2 border-[#39ff14] shadow-[0_0_20px_rgba(57,255,20,0.15)] backdrop-blur-md mb-2 transition-all duration-300 shrink-0">
                    <h3 class="text-xs text-[#39ff14] font-black mb-4 tracking-widest uppercase text-center flex items-center justify-center gap-2 drop-shadow-[0_0_5px_rgba(57,255,20,0.5)]">
                        <i class="fa-solid fa-magnifying-glass"></i> İPUÇLARI
                    </h3>
                    <div id="clues-area" class="flex flex-col gap-3 text-sm sm:text-base font-bold text-gray-300">
                    </div>
                </div>

                <div id="message-area" class="text-center font-black text-xl w-full hidden mt-4 shrink-0"></div>
                <button id="next-btn" class="hidden shrink-0"></button>
            </div>
        </main>

        <footer class="w-full p-4 sm:p-8 shrink-0 z-40 flex justify-center">
            <div class="relative w-full max-w-lg">
                <input type="text" id="guess-input" placeholder="Futbolcunun adını yaz..." autocomplete="off" 
                       class="w-full appearance-none bg-gray-900 border-2 border-[#39ff14] rounded-2xl py-4 px-6 focus:outline-none focus:shadow-[0_0_25px_rgba(57,255,20,0.4)] text-lg font-bold text-white placeholder-gray-500 transition-all">
                
                <button onclick="makeGuess()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-[#39ff14] text-black w-12 h-12 flex items-center justify-center rounded-xl hover:bg-white transition font-black shadow-[0_0_15px_rgba(57,255,20,0.4)] active:scale-95">
                    <i class="fa-solid fa-check text-xl"></i>
                </button>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD62cMqFmtT_LYOQdyLEib3TlP2sDXVHUY",
            authDomain: "futbol-hub0.firebaseapp.com", 
            projectId: "futbol-hub0", 
            storageBucket: "futbol-hub0.firebasestorage.app", 
            messagingSenderId: "995690857981", 
            appId: "1:995690857981:web:01f199920e1c131cd04594", 
            measurementId: "G-7JT28VLCTE" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;

        window.saveScoreToFirebase = async (newScore, gameName) => {
            const userStr = localStorage.getItem('firebaseUser');
            if (!userStr) return;
            const user = JSON.parse(userStr);

            try {
                const scoresRef = collection(db, "scores");
                const q = query(scoresRef, where("email", "==", user.email));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const existingDoc = querySnapshot.docs[0]; 
                    const userDocRef = doc(db, "scores", existingDoc.id);

                    await updateDoc(userDocRef, {
                        score: increment(newScore), 
                        lastGame: gameName,
                        lastPlayedDate: new Date()
                    });
                } else {
                    await addDoc(scoresRef, {
                        name: user.name,
                        email: user.email,
                        photo: user.photo,
                        score: newScore,
                        lastGame: gameName,
                        lastPlayedDate: new Date()
                    });
                }
            } catch (e) { console.error("Hata:", e); }
        };
    </script>
    <script src="script.js"></script>

    <script>
        const gameSounds = {
            click: new Audio('../../assets/sounds/click.mp3'),
            success: new Audio('../../assets/sounds/success.mp3'),
            wrong: new Audio('../../assets/sounds/wrong.mp3'),
            reveal: new Audio('../../assets/sounds/reveal.mp3')
        };
        
        gameSounds.click.volume = 0.4;
        gameSounds.success.volume = 0.6;
        gameSounds.wrong.volume = 0.5;
        gameSounds.reveal.volume = 0.3;
        
        window.playSound = function(soundName) {
            let isMuted = localStorage.getItem('futbolHub_muted') === 'true';
            if (isMuted) return;

            if (gameSounds[soundName]) {
                gameSounds[soundName].currentTime = 0;
                gameSounds[soundName].play().catch(e => console.warn("Ses hatası:", e));
            }
        };

        // Ekrondaki butonlara (Ana menüye dön, zorluk seçimi, onaylama) click sesi ekler
        document.addEventListener('click', function(e) {
            if (e.target.closest('button, a')) {
                playSound('click');
            }
        });
    </script>

</body>
</html>
